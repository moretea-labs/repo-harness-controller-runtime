name: Apply Gmail Assistant Routines

on:
  push:
    branches:
      - feat/gmail-assistant-routines
    paths:
      - scripts/apply-gmail-assistant-routines.py
      - .github/workflows/apply-gmail-assistant-routines.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gmail-assistant-routines
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile

      - name: Apply integration patch
        run: python3 scripts/apply-gmail-assistant-routines.py

      - name: Type check
        run: bun x tsc --noEmit

      - name: Focused tests
        shell: bash
        run: |
          set +e
          bun test tests/runtime/gmail-assistant-routines.test.ts 2>&1 | tee gmail-routine-test.log
          echo "${PIPESTATUS[0]}" > gmail-routine-test.status
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gmail-routine-test-output
          path: |
            gmail-routine-test.log
            gmail-routine-test.status

      - name: Enforce focused test result
        run: test "$(cat gmail-routine-test.status)" = "0"

      - name: Commit generated implementation
        if: github.event_name == 'push'
        run: |
          git config user.name "repo-harness automation"
          git config user.email "actions@users.noreply.github.com"
          git rm scripts/apply-gmail-assistant-routines.py .github/workflows/apply-gmail-assistant-routines.yml
          git add src tests docs
          git diff --cached --quiet && exit 0
          git commit -m "feat(assistant): implement durable Gmail routines"
          git push origin HEAD:feat/gmail-assistant-routines
