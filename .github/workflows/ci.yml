name: Apply MCP Setup V8 Test Alignment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Align V8 connector identity expectations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/cli/mcp-setup.test.ts')
          text = path.read_text()
          old = 'repo-harness-controller-v7'
          count = text.count(old)
          if count != 4:
            raise SystemExit(f'expected 4 V7 identities, found {count}')
          path.write_text(text.replace(old, 'repo-harness-controller-v8'))
          PY

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Focused verification
        run: |
          bun test tests/cli/mcp-setup.test.ts
          bun run check:type

      - name: Commit verified test alignment
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/cli/mcp-setup.test.ts
          git diff --cached --check
          git commit -m "test: align MCP setup expectations with V8"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
