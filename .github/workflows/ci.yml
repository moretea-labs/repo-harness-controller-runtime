name: Diagnose Task Workflow Fixture

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - name: Print failing fixture output
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/helper-scripts.test.ts')
          text = path.read_text()
          anchor = '''      const res = run("bash", ["scripts/check-task-workflow.sh", "--strict"], cwd);

      expect(res.status).toBe(0);
      expect(res.stdout).not.toContain("resume packet references a historical plan");'''
          replacement = '''      const res = run("bash", ["scripts/check-task-workflow.sh", "--strict"], cwd);
      console.error("TASK_WORKFLOW_STDOUT\\n" + res.stdout);
      console.error("TASK_WORKFLOW_STDERR\\n" + res.stderr);

      expect(res.status).toBe(0);
      expect(res.stdout).not.toContain("resume packet references a historical plan");'''
          if anchor not in text:
            raise SystemExit('fixture anchor not found')
          path.write_text(text.replace(anchor, replacement, 1))
          PY
          bun test tests/helper-scripts.test.ts
