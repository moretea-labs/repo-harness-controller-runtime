name: Task Workflow Fixture Diagnostic

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile

      - name: Run fixture with captured checker output
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/helper-scripts.test.ts')
          text = path.read_text()
          anchor = '''      const res = run("bash", ["scripts/check-task-workflow.sh", "--strict"], cwd);

      expect(res.status).toBe(0);
      expect(res.stdout).not.toContain("resume packet references a historical plan");'''
          replacement = '''      const res = run("bash", ["scripts/check-task-workflow.sh", "--strict"], cwd);
      console.error("TASK_WORKFLOW_STATUS=" + res.status);
      console.error("TASK_WORKFLOW_STDOUT\\n" + res.stdout);
      console.error("TASK_WORKFLOW_STDERR\\n" + res.stderr);

      expect(res.status).toBe(0);
      expect(res.stdout).not.toContain("resume packet references a historical plan");'''
          if anchor not in text:
            raise SystemExit('fixture anchor not found')
          path.write_text(text.replace(anchor, replacement, 1))
          PY
          set +e
          bun test tests/helper-scripts.test.ts 2>&1 | tee task-workflow-fixture.log
          echo "${PIPESTATUS[0]}" > task-workflow-fixture.status
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: task-workflow-fixture-output
          path: |
            task-workflow-fixture.log
            task-workflow-fixture.status
