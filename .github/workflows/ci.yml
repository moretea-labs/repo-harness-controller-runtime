name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      BUN_TEST_MAX_CONCURRENCY: "1"
      BUN_TEST_TIMEOUT_MS: "180000"
      BUN_TEST_ISOLATE_FILES: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install shell dependencies
        run: sudo apt-get update && sudo apt-get install -y jq rsync zip

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: CI gate
        run: |
          set -o pipefail
          bun run check:ci 2>&1 | tee ci.log

      - name: Build final source archive
        if: always()
        run: |
          git show HEAD^:.github/workflows/ci.yml > .github/workflows/ci.yml
          zip -r /tmp/repo-harness-v8.1-full-ready.zip . -x '.git/*' -x 'ci.log'

      - name: Upload final verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repo-harness-v8.1-final-artifacts
          path: |
            /tmp/repo-harness-v8.1-full-ready.zip
            ci.log
          if-no-files-found: error
          retention-days: 30

      - name: Diff hygiene
        if: always()
        run: git diff --check
