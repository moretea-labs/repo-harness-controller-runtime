name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      BUN_TEST_MAX_CONCURRENCY: "1"
      BUN_TEST_TIMEOUT_MS: "180000"
      BUN_TEST_ISOLATE_FILES: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install shell dependencies
        run: sudo apt-get update && sudo apt-get install -y jq rsync

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture full test suite
        shell: bash
        run: |
          set +e
          status=0
          : > full-tests.log
          while IFS= read -r file; do
            echo "[ci] test $file" | tee -a full-tests.log
            bun test --timeout "$BUN_TEST_TIMEOUT_MS" --max-concurrency 1 "$file" 2>&1 | tee -a full-tests.log
            command_status=${PIPESTATUS[0]}
            if [[ "$command_status" -ne 0 ]]; then
              status="$command_status"
              break
            fi
          done < <(find tests -type f -name '*.test.ts' | LC_ALL=C sort)
          echo "$status" > full-tests.status
          exit 0

      - name: Upload full test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-prerequisite-full-tests-log
          path: |
            full-tests.log
            full-tests.status

      - name: Fail when tests failed
        run: |
          status="$(cat full-tests.status)"
          if [[ "$status" -ne 0 ]]; then
            tail -n 120 full-tests.log
            exit "$status"
          fi
