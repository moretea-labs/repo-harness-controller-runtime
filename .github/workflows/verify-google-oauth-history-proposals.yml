name: Verify Google OAuth History Proposals

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/google-oauth-history-proposals
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile
      - run: python3 scripts/apply-google-oauth-history-proposals.py
      - run: bun x tsc --noEmit
      - run: bun test tests/runtime/gmail-assistant-routines.test.ts tests/runtime/google-oauth-history-proposals.test.ts

      - name: Commit verified implementation
        run: |
          git config user.name "repo-harness automation"
          git config user.email "actions@users.noreply.github.com"
          git add src tests docs
          git diff --cached --quiet && exit 0
          git commit -m "feat(assistant): complete OAuth History and proposal approvals"
          git push origin HEAD:feat/google-oauth-history-proposals
