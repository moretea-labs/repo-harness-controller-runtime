name: Verify Google OAuth History Proposals

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/google-oauth-history-proposals
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile
      - name: Apply review hardening
        run: |
          python3 scripts/harden-oauth-history-proposals.py
          python3 scripts/fix-google-oauth-scope-aliases.py

      - name: Type check
        shell: bash
        run: |
          set +e
          bun x tsc --noEmit 2>&1 | tee oauth-history-tsc.log
          echo "${PIPESTATUS[0]}" > oauth-history-tsc.status
          exit 0

      - name: Focused tests
        shell: bash
        run: |
          set +e
          bun test tests/runtime/gmail-assistant-routines.test.ts tests/runtime/google-oauth-history-proposals.test.ts tests/runtime/capability-recovery.test.ts 2>&1 | tee oauth-history-tests.log
          echo "${PIPESTATUS[0]}" > oauth-history-tests.status
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oauth-history-proposal-diagnostics
          path: |
            oauth-history-tsc.log
            oauth-history-tsc.status
            oauth-history-tests.log
            oauth-history-tests.status

      - name: Enforce verification
        run: |
          test "$(cat oauth-history-tsc.status)" = "0"
          test "$(cat oauth-history-tests.status)" = "0"

      - name: Commit verified hardening
        run: |
          git config user.name "repo-harness automation"
          git config user.email "actions@users.noreply.github.com"
          git add src tests docs
          git diff --cached --quiet && exit 0
          git commit -m "fix(assistant): harden OAuth History and proposal audit"
          git push origin HEAD:feat/google-oauth-history-proposals
