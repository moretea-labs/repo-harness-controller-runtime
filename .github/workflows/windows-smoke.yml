name: Windows smoke

on:
  pull_request:
    paths:
      - "install.ps1"
      - "install.sh"
      - "bin/**"
      - "src/**"
      - "tests/install-scripts.test.ts"
      - "tests/cli/global-runtime-init.test.ts"
      - "scripts/check-platform-support.mjs"
      - "docs/operations/platform-support.md"
      - ".github/workflows/windows-smoke.yml"
  push:
    branches: [main]
    paths:
      - "install.ps1"
      - "install.sh"
      - "bin/**"
      - "src/**"
      - "tests/install-scripts.test.ts"
      - "tests/cli/global-runtime-init.test.ts"
      - "scripts/check-platform-support.mjs"
      - "docs/operations/platform-support.md"
      - ".github/workflows/windows-smoke.yml"
  workflow_dispatch:

jobs:
  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.10"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: PowerShell installer dry run
        shell: pwsh
        run: .\install.ps1 -DryRun -Runtime auto
      - name: Platform contract
        run: bun run check:platform-support
      - name: Installer and Windows policy tests
        run: bun test tests/install-scripts.test.ts tests/cli/global-runtime-init.test.ts
      - name: Node portable smoke
        run: bun run test:node-smoke
