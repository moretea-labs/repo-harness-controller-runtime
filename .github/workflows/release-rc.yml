name: Release npm RC

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type PUBLISH_RC to publish package.json to the next dist-tag
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release-rc
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Validate manual confirmation
        shell: bash
        run: |
          test "${{ inputs.confirmation }}" = "PUBLISH_RC"
          test "$GITHUB_REF_NAME" = "main"

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Upgrade npm for Trusted Publishing
        run: npm install --global npm@latest

      - name: Run release gate
        run: npm run check:release-readiness

      - name: Publish to next with provenance
        run: npm publish --tag next --access public --provenance
