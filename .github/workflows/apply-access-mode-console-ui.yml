name: Apply access mode console UI

on:
  push:
    branches:
      - feature/access-mode-console-ui
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/access-mode-console-ui
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Apply deterministic patch
        run: node scripts/apply-access-mode-console-ui-v2.mjs
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Focused tests
        run: |
          set -o pipefail
          bun test tests/access-policy.test.ts tests/runtime/access-mcp-tools.test.ts tests/cli/local-bridge-access-mode.test.ts 2>&1 | tee focused-test-output.txt
          if grep -Eq '(^|[^0-9])[1-9][0-9]* fail|# Unhandled error|ReferenceError:|TypeError:' focused-test-output.txt; then
            echo "Focused tests reported failures"
            exit 1
          fi
      - name: Upload verified source files
        uses: actions/upload-artifact@v4
        with:
          name: verified-access-mode-console-source
          path: |
            src/cli/mcp/toolset-names.ts
            src/cli/mcp/toolset.ts
            src/cli/local-bridge/connector-freshness.ts
            src/cli/local-bridge/console-view-models.ts
            src/cli/local-bridge/facade-api.ts
            src/cli/local-bridge/server.ts
            src/cli/local-bridge/dashboard.ts
            tests/cli/local-bridge-access-mode.test.ts
            focused-test-output.txt
