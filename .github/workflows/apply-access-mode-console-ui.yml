name: Apply access mode console UI

on:
  push:
    branches:
      - feature/access-mode-console-ui
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/access-mode-console-ui
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Apply deterministic patch
        run: node scripts/apply-access-mode-console-ui.mjs
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Focused tests
        run: bun test tests/access-policy.test.ts tests/runtime/access-mcp-tools.test.ts tests/cli/local-bridge-access-mode.test.ts
      - name: Commit verified source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/cli/local-bridge/console-view-models.ts \
                  src/cli/local-bridge/facade-api.ts \
                  src/cli/local-bridge/server.ts \
                  src/cli/local-bridge/dashboard.ts \
                  tests/cli/local-bridge-access-mode.test.ts
          git commit -m "feat(console): add Request and Full Access selector"
          git push origin HEAD:feature/access-mode-console-ui
