name: Verify Gmail Routine Lifecycle

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gmail-assistant-routines
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - run: bun install --frozen-lockfile
      - run: python3 scripts/fix-gmail-routine-lifecycle.py
      - run: bun x tsc --noEmit
      - run: bun test tests/runtime/gmail-assistant-routines.test.ts

      - name: Commit verified fixes
        run: |
          git config user.name "repo-harness automation"
          git config user.email "actions@users.noreply.github.com"
          git add src tests
          git diff --cached --quiet && exit 0
          git commit -m "fix(assistant): preserve Routine lifecycle and backlog"
          git push origin HEAD:feat/gmail-assistant-routines
