<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">repo-harness Controller Runtime</title>
  <desc id="desc">A dark technical banner showing ChatGPT controlling repository work through a local controller with Direct Edit, Tasks, Agents, and verification.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="40" x2="1216" y2="604" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#10233E"/>
      <stop offset="1" stop-color="#0A172B"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1046 132) rotate(132) scale(430 500)">
      <stop stop-color="#42E2CD" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#42E2CD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 540) rotate(-18) scale(430 250)">
      <stop stop-color="#558BFF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#558BFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="720" y1="84" x2="1200" y2="554" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.055"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="0" x2="540" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#77E7D7"/>
      <stop offset="1" stop-color="#8DB3FF"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#B4C9EA" stroke-opacity="0.09"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#94BBFF"/>
    </marker>
    <filter id="shadow" x="-30" y="-30" width="1340" height="700" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#020710" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>
  <rect width="1280" height="640" rx="32" fill="url(#grid)"/>
  <circle cx="1046" cy="132" r="280" fill="url(#cyanGlow)"/>
  <circle cx="220" cy="540" r="250" fill="url(#blueGlow)"/>

  <rect x="76" y="72" width="222" height="40" rx="20" fill="#102744" stroke="#79DED2" stroke-opacity="0.42"/>
  <circle cx="101" cy="92" r="5" fill="#79DED2"/>
  <circle cx="120" cy="92" r="5" fill="#8DB3FF"/>
  <circle cx="139" cy="92" r="5" fill="#FFC26F"/>
  <text x="160" y="98" fill="#DCEAFF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700">LOCAL EXECUTION BRIDGE</text>

  <text x="78" y="204" fill="#F7FAFF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="800" letter-spacing="-2">repo-harness</text>
  <text x="78" y="264" fill="url(#accent)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="800">Controller Runtime</text>
  <text x="80" y="322" fill="#D9E6FA" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="23" font-weight="600">ChatGPT controls the workflow.</text>
  <text x="80" y="359" fill="#BFD0EA" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="21" font-weight="500">Your repository keeps the plans, diffs, checks, and handoffs.</text>

  <g>
    <rect x="80" y="420" width="182" height="46" rx="23" fill="#0C263F" stroke="#71DCCD" stroke-opacity="0.4"/>
    <text x="171" y="449" text-anchor="middle" fill="#EEFFFC" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Direct Edit first</text>
    <rect x="278" y="420" width="194" height="46" rx="23" fill="#112746" stroke="#8CB4FF" stroke-opacity="0.4"/>
    <text x="375" y="449" text-anchor="middle" fill="#F2F6FF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Issue → Task → Run</text>
    <rect x="80" y="482" width="202" height="46" rx="23" fill="#17213B" stroke="#B8A8FF" stroke-opacity="0.4"/>
    <text x="181" y="511" text-anchor="middle" fill="#F5F1FF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Optional Agents</text>
    <rect x="298" y="482" width="220" height="46" rx="23" fill="#29220F" stroke="#FFC36F" stroke-opacity="0.4"/>
    <text x="408" y="511" text-anchor="middle" fill="#FFF6E8" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700">Reviewable evidence</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="692" y="76" width="510" height="488" rx="30" fill="url(#panel)" stroke="#D8E6FF" stroke-opacity="0.2"/>
  </g>

  <line x1="820" y1="244" x2="904" y2="244" stroke="#94BBFF" stroke-width="4" stroke-opacity="0.8" marker-end="url(#arrow)"/>
  <line x1="1012" y1="244" x2="1080" y2="244" stroke="#94BBFF" stroke-width="4" stroke-opacity="0.8" marker-end="url(#arrow)"/>
  <line x1="956" y1="292" x2="956" y2="350" stroke="#79DED2" stroke-width="4" stroke-opacity="0.78" marker-end="url(#arrow)"/>

  <rect x="730" y="176" width="154" height="116" rx="22" fill="#112846" stroke="#8DB3FF" stroke-opacity="0.38"/>
  <text x="754" y="218" fill="#F7FAFF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="800">ChatGPT</text>
  <text x="754" y="247" fill="#C8D9F5" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="650">reason · route · review</text>
  <text x="754" y="270" fill="#9BB4D9" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">Project-scoped repoId</text>

  <rect x="904" y="176" width="176" height="116" rx="22" fill="#0D2C31" stroke="#71DCCD" stroke-opacity="0.4"/>
  <text x="928" y="218" fill="#F5FFFD" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="25" font-weight="800">Controller</text>
  <text x="928" y="247" fill="#C1F2EA" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="650">tools · policy · state</text>
  <text x="928" y="270" fill="#8BCBC1" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">local and bounded</text>

  <rect x="1080" y="176" width="92" height="116" rx="22" fill="#2A220F" stroke="#FFC36F" stroke-opacity="0.42"/>
  <text x="1102" y="218" fill="#FFF9EF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="23" font-weight="800">Repo</text>
  <text x="1102" y="247" fill="#F5DDAE" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="650">Git files</text>
  <text x="1102" y="270" fill="#C9AC77" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">truth</text>

  <rect x="760" y="350" width="196" height="114" rx="22" fill="#201A38" stroke="#B7A7FF" stroke-opacity="0.38"/>
  <text x="784" y="391" fill="#FAF8FF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Optional Agents</text>
  <text x="784" y="421" fill="#DED6FF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="650">Codex · Claude · Copilot</text>
  <text x="784" y="444" fill="#AFA1DD" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">only when delegated</text>

  <rect x="976" y="350" width="196" height="114" rx="22" fill="#12263C" stroke="#8DB3FF" stroke-opacity="0.35"/>
  <text x="1000" y="391" fill="#F7FAFF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="800">Verification</text>
  <text x="1000" y="421" fill="#D2E0F6" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="650">diffs · checks · evidence</text>
  <text x="1000" y="444" fill="#9DB4D5" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600">accept or roll back</text>

  <rect x="730" y="500" width="442" height="36" rx="18" fill="#0D2037" stroke="#9FBCE6" stroke-opacity="0.25"/>
  <text x="951" y="523" text-anchor="middle" fill="#BDD0EB" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700">Local runtime · HTTPS MCP · Multi-repository registry · MIT</text>

  <text x="80" y="590" fill="#8FA9CF" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="650">Open-source repository controller for durable, reviewable AI engineering work</text>
</svg>
